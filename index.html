<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.T.A.L.K.E.R. Trader Builder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0d0f0b;
    --bg2: #121510;
    --bg3: #181c14;
    --bg4: #1e241a;
    --panel: #141812;
    --border: #2a3424;
    --border2: #3a4832;
    --accent: #6daa3f;
    --accent2: #4e7d2c;
    --accent-dim: #3a5a1f;
    --text: #c8d4b8;
    --text2: #8fa07a;
    --text3: #556645;
    --danger: #c04040;
    --warn: #c08830;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
  }
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .logo span { color: var(--text3); }
  .header-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
    text-transform: uppercase;
  }
  .header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

  /* ── LAYOUT ── */
  .app {
    flex: 1;
    display: grid;
    grid-template-columns: var(--left-w, 300px) 5px 1fr 340px;
    overflow: hidden;
    gap: 0;
  }

  /* ── RESIZE HANDLE ── */
  .resize-handle {
    width: 5px;
    background: transparent;
    cursor: col-resize;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
    transition: background 0.15s;
    border-right: 1px solid var(--border);
  }
  .resize-handle:hover, .resize-handle.dragging {
    background: var(--accent-dim);
    border-right-color: var(--accent);
  }

  /* ── PANELS ── */
  .panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }
  .panel:last-child { border-right: none; }
  .panel-header {
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .panel-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    flex: 1;
  }
  .panel-body { flex: 1; overflow-y: auto; padding: 0; }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }

  /* ── BUTTONS ── */
  .btn {
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.5px;
    padding: 5px 12px;
    border: 1px solid var(--border2);
    border-radius: 3px;
    background: var(--bg4);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
  .btn.primary { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent2); }
  .btn.danger { border-color: var(--danger); color: var(--danger); }
  .btn.danger:hover { background: #3a1010; }
  .btn.small { font-size: 11px; padding: 3px 8px; }

  /* ── INPUTS ── */
  input[type=text], input[type=number], select {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 3px;
    color: var(--text);
    padding: 5px 8px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=text]:focus, input[type=number]:focus, select:focus {
    border-color: var(--accent);
  }
  select option { background: var(--bg3); }

  /* ── SEARCH ── */
  .search-wrap { padding: 8px; }
  .search-wrap input { width: 100%; }

  /* ── CATEGORY LIST ── */
  .cat-group { border-bottom: 1px solid var(--border); }
  .cat-header {
    padding: 7px 12px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--accent);
    background: var(--bg3);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  .cat-header:hover { background: var(--bg4); }
  .cat-chevron { font-size: 8px; color: var(--text3); transition: transform 0.15s; }
  .cat-chevron.open { transform: rotate(90deg); }
  .cat-items { display: none; }
  .cat-items.open { display: block; }
  .item-row {
    padding: 4px 12px 4px 20px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: background 0.1s;
    border-bottom: 1px solid #1a1f16;
  }
  .item-row > span:first-child { flex-shrink: 0; }
  .item-row:hover { background: var(--bg4); color: var(--text); }
  .item-row .add-icon {
    font-size: 14px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.1s;
    line-height: 1;
    flex-shrink: 0;
  }
  .item-row:hover .add-icon { opacity: 1; }
  .item-in-trader-icon {
    color: var(--accent);
    font-size: 12px;
    margin-right: 4px;
    flex-shrink: 0;
  }
  .item-disp-name {
    font-family: var(--sans);
    font-size: 11px;
    color: var(--text3);
    flex: 1;
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 0 6px 0 8px;
    font-style: italic;
  }
  .item-row:hover .item-disp-name { color: var(--text2); }

  /* tier item display name */
  .tier-item-disp-name {
    font-family: var(--sans);
    font-size: 11px;
    color: var(--text3);
    flex: 1;
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 0 6px;
    font-style: italic;
    min-width: 0;
  }
  .tier-item:hover .tier-item-disp-name { color: var(--text2); }

  /* ── MIDDLE: TRADERS ── */
  .traders-wrap { padding: 8px; }
  .trader-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .trader-bar input { flex: 1; }

  .trader-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .trader-card.active { border-color: var(--accent-dim); }
  .trader-card-header {
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg4);
    cursor: pointer;
    border-bottom: 1px solid var(--border);
  }
  .trader-card-header:hover { background: #222c1a; }
  .trader-name {
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.5px;
    flex: 1;
    text-transform: uppercase;
  }
  .trader-meta { font-size: 11px; color: var(--text3); font-family: var(--mono); }

  .tier-list { padding: 8px; display: flex; flex-direction: column; gap: 6px; }

  .tier-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .tier-card.selected { border-color: var(--accent); }
  .tier-header {
    padding: 6px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .tier-header:hover { background: var(--bg3); }
  .tier-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    flex: 1;
  }
  .tier-parent {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }
  .tier-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    background: var(--bg3);
    padding: 1px 6px;
    border-radius: 2px;
    border: 1px solid var(--border);
  }

  .tier-items-list { padding: 4px 0; }
  .tier-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    border-bottom: 1px solid #161a12;
    transition: background 0.1s;
  }
  .tier-item:hover { background: var(--bg2); }
  .tier-item-name { flex-shrink: 0; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tier-item-spacer { flex: 1; } /* pushes inputs right when no display name is present */
  .tier-item input[type=number] {
    width: 46px;
    padding: 2px 5px;
    font-size: 11px;
    text-align: center;
  }
  .tier-item-sep { color: var(--text3); font-size: 10px; }
  .tier-item .rm { cursor: pointer; color: var(--text3); font-size: 13px; transition: color 0.1s; padding: 0 2px; }
  .tier-item .rm:hover { color: var(--danger); }

  /* ── DRAG & DROP ── */
  .sortable-ghost {
    opacity: 0.4;
    background: var(--accent);
  }
  .drag-handle {
    cursor: grab;
    color: var(--text3);
    font-size: 14px;
    padding: 0 4px;
    user-select: none;
    flex-shrink: 0;
  }
  .drag-handle:hover {
    color: var(--accent);
  }
  .drag-handle:active {
    cursor: grabbing;
  }

  /* ── COMMENT ROWS ── */
  .tier-comment {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-bottom: 1px solid #161a12;
    background: #0f130d;
    transition: background 0.1s;
  }
  .tier-comment:hover { background: #131710; }
  .comment-prefix {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
    flex-shrink: 0;
  }
  .comment-input {
    font-family: var(--mono) !important;
    font-size: 11px !important;
    color: var(--text3) !important;
    background: transparent !important;
    border: none !important;
    border-bottom: 1px dashed var(--border) !important;
    border-radius: 0 !important;
    padding: 1px 3px !important;
    width: 0;
    flex: 1;
    outline: none !important;
  }
  .comment-input:focus {
    color: var(--text2) !important;
    border-bottom-color: var(--accent-dim) !important;
  }
  .comment-input::placeholder { color: var(--text3); opacity: 0.5; }
  .tier-comment-spacer { flex: 0; }
  .tier-comment .rm { cursor: pointer; color: var(--text3); font-size: 13px; transition: color 0.1s; padding: 0 2px; flex-shrink: 0; }
  .tier-comment .rm:hover { color: var(--danger); }
  .add-comment-row { padding: 0; }

  .add-tier-wrap { padding: 6px 8px 8px; }
  .add-tier-row { display: flex; gap: 6px; align-items: center; }
  .add-tier-row input { flex: 1; }

  /* ── RIGHT: EXPORT ── */
  .export-panel { display: flex; flex-direction: column; gap: 0; }
  .export-options { padding: 10px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid var(--border); }
  .export-option { display: flex; flex-direction: column; gap: 4px; }
  .export-label { font-size: 11px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.5px; }
  .export-textarea {
    flex: 1;
    background: var(--bg);
    border: none;
    border-top: 1px solid var(--border);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 11px;
    padding: 10px 12px;
    resize: none;
    outline: none;
    line-height: 1.7;
  }
  .export-actions { padding: 8px; display: flex; gap: 6px; border-top: 1px solid var(--border); flex-shrink: 0; }

  /* ── SELECTED TIER INDICATOR ── */
  .sel-indicator {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    padding: 4px 12px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    display: none;
  }
  .sel-indicator.show { display: block; }

  /* ── UPLOAD BUTTON ── */
  .file-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.5px;
    padding: 5px 12px;
    border: 1px solid var(--border2);
    border-radius: 3px;
    background: var(--bg4);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .file-label:hover { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
  input[type=file] { display: none; }

  /* ── EMPTY STATES ── */
  .empty {
    text-align: center;
    padding: 24px 12px;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.5px;
  }

  /* ── SCROLLBAR GENERAL ── */
  * { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }

  /* ── CONTEXT BADGE ── */
  .badge {
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 5px;
    border-radius: 2px;
    background: var(--accent-dim);
    color: var(--accent);
    letter-spacing: 0.5px;
    border: 1px solid var(--accent-dim);
  }

  /* ── OVERWRITE FLAGS ── */
  .ow-badge {
    font-family: var(--mono);
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 2px;
    white-space: nowrap;
    flex-shrink: 0;
    cursor: help;
  }
  .ow-badge-dead {
    background: #2a1010;
    color: var(--danger);
    border: 1px solid #5a2020;
  }
  .ow-badge-active {
    background: #0e2010;
    color: #5aaa5a;
    border: 1px solid #1e5a1e;
  }
  .ow-badge-both {
    background: #2a2010;
    color: var(--warn);
    border: 1px solid #5a4010;
  }
  .tier-item.ow-dead { background: #120d0d; }
  .tier-item.ow-dead .tier-item-name { color: #6a4040; }
  .tier-item.ow-active { background: #0a140a; }
  .tier-item.ow-both { background: #130f08; }

  /* ── GRID helpers ── */
  .row { display: flex; gap: 8px; align-items: center; }
  .flex1 { flex: 1; }

  /* ── Notifications ── */
  #notif {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: #fff;
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 18px;
    border-radius: 3px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 999;
    white-space: nowrap;
  }
  #notif.show { opacity: 1; }

  .export-select-wrap { padding: 8px; border-bottom: 1px solid var(--border); }

  .highlight { color: var(--accent); }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<header>
  <div class="logo">S.T.A.L.K.E.R. <span>// </span>ANOMALY</div>
  <div class="header-title">Trader Builder</div>
  <div class="header-actions">
    <label class="file-label">
      ⬆ Load Categories
      <input type="file" id="catFile" accept=".ltx,.txt">
    </label>
    <label class="file-label">
      ⬆ Load Names (.xml)
      <input type="file" id="namesFiles" accept=".xml" multiple>
    </label>
    <button class="btn primary" onclick="exportAll()">⬇ Export .ltx</button>
    <button class="btn" onclick="clearCache()" title="Clear cached categories and names">✕ Clear Cache</button>
  </div>
</header>

<div class="app" id="appGrid">

  <!-- LEFT: ITEM BROWSER -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Item Browser</span>
      <span id="catCount" class="badge">0 items</span>
    </div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search items..." oninput="filterItems()">
    </div>
    <div class="sel-indicator" id="selIndicator">← Click item to add to selected tier</div>
    <div class="panel-body" id="catList">
      <div class="empty">Load a categories .ltx file<br>to browse items</div>
    </div>
  </div><div class="resize-handle" id="leftResizeHandle"></div>

  <!-- MIDDLE: TRADERS & TIERS -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Traders & Tiers</span>
    </div>
    <div class="panel-body">
      <div class="traders-wrap">
        <div class="trader-bar">
          <input type="text" id="newTraderName" placeholder="New trader name (e.g. sidorovich)">
          <button class="btn primary" onclick="addTrader()">+ Add</button>
          <button class="btn" onclick="triggerImportDialog()" title="Import an existing trader .ltx file">⬆ Import</button>
          <input type="file" id="importFile" accept=".ltx,.txt" style="display:none">
        </div>
        <div id="traderList"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT: EXPORT PREVIEW -->
  <div class="panel export-panel">
    <div class="panel-header">
      <span class="panel-title">LTX Output</span>
    </div>
    <div class="export-select-wrap">
      <div class="row">
        <span class="export-label flex1">Export trader:</span>
        <select id="exportTraderSel" style="flex:2" onchange="renderExport()">
          <option value="__all__">All traders</option>
        </select>
      </div>
    </div>
    <textarea class="export-textarea" id="exportArea" readonly placeholder="; Output will appear here&#10;; Create a trader and add items to get started"></textarea>
    <div class="export-actions">
      <button class="btn primary flex1" onclick="copyExport()">Copy</button>
      <button class="btn flex1" onclick="downloadExport()">Download .ltx</button>
    </div>
  </div>

</div>

<div id="notif"></div>

<script>
// ── STATE ──
let categories = {}; // { catName: [item1, item2, ...] }
let itemNames = {};  // { itemId: "Display Name" }
let traders = [];    // [{ id, name, tiers: [{ id, name, parent, items: [{name,amt,chance}] }] }]
let selectedTier = null; // { traderId, tierId }
let uid = 1;
const genId = () => uid++;

// ── LOCALSTORAGE CACHE ──
const CACHE_KEY_CATS = 'trader_builder_categories';
const CACHE_KEY_NAMES = 'trader_builder_names';

function saveCategoriesToCache(text) {
  try { localStorage.setItem(CACHE_KEY_CATS, text); } catch(e) { console.warn('Failed to save categories to cache:', e); }
}

function saveNamesToCache(names) {
  try { localStorage.setItem(CACHE_KEY_NAMES, JSON.stringify(names)); } catch(e) { console.warn('Failed to save names to cache:', e); }
}

function loadCategoriesFromCache() {
  const cached = localStorage.getItem(CACHE_KEY_CATS);
  if (cached) {
    categories = parseLtx(cached);
    return true;
  }
  return false;
}

function loadNamesFromCache() {
  const cached = localStorage.getItem(CACHE_KEY_NAMES);
  if (cached) {
    try {
      itemNames = JSON.parse(cached);
      return true;
    } catch(e) { console.warn('Failed to parse cached names:', e); }
  }
  return false;
}

function clearCache() {
  localStorage.removeItem(CACHE_KEY_CATS);
  localStorage.removeItem(CACHE_KEY_NAMES);
  notify('Cache cleared');
}

// ── BUILT-IN DEFAULT CATEGORIES (from uploaded file) ──
const DEFAULT_LTX = `[wpn_pistol_rus_low]

// ── PARSE LTX CATEGORIES ──
function parseLtx(text) {
  const result = {};
  let currentCat = null;
  const lines = text.split(/\r?\n/);
  for (let line of lines) {
    line = line.trim();
    if (!line || line.startsWith(';')) continue;
    // Skip macro/inheritance categories that contain ':'
    const headerMatch = line.match(/^\[([^\]]+)\]/);
    if (headerMatch) {
      const raw = headerMatch[1];
      // skip if contains colon (these are aggregates)
      if (raw.includes(':')) { currentCat = null; continue; }
      currentCat = raw;
      if (!result[currentCat]) result[currentCat] = [];
    } else if (currentCat) {
      // item line: take first word, strip inline comments/prices
      const itemName = line.split(/[\s;]/)[0].trim();
      if (itemName && !itemName.startsWith(';')) {
        result[currentCat].push(itemName);
      }
    }
  }
  return result;
}

// ── INIT WITH DEFAULT ──
function initDefault() {
  const hadCats = loadCategoriesFromCache();
  const hadNames = loadNamesFromCache();
  
  if (!hadCats) {
    categories = parseLtx(DEFAULT_LTX);
  }
  
  renderCatList('');
  updateCatCount();
  
  if (hadCats && hadNames) {
    notify('Loaded from cache: ' + Object.keys(categories).length + ' sections, ' + Object.keys(itemNames).length + ' names');
  } else if (hadCats) {
    notify('Loaded categories from cache: ' + Object.keys(categories).length + ' sections');
  } else if (hadNames) {
    notify('Loaded names from cache: ' + Object.keys(itemNames).length + ' names');
  }
}

// ── GET ALL ITEMS FROM A TRADER ──
function getTraderItems(traderId) {
  const trader = traders.find(t => t.id === traderId);
  if (!trader) return new Set();
  const items = new Set();
  for (const tier of trader.tiers) {
    for (const entry of tier.items) {
      if (entry.type === 'item') {
        items.add(entry.name);
      }
    }
  }
  return items;
}

// ── CATEGORY RENDER ──
function renderCatList(filter) {
  const el = document.getElementById('catList');
  const fl = filter.toLowerCase();
  let html = '';
  let totalVisible = 0;

  const traderItems = selectedTier ? getTraderItems(selectedTier.traderId) : null;

  for (const [cat, items] of Object.entries(categories)) {
    const visible = fl
      ? items.filter(i => i.toLowerCase().includes(fl) || (itemNames[i] && itemNames[i].toLowerCase().includes(fl)))
      : items;
    if (visible.length === 0) continue;
    totalVisible += visible.length;
    const catId = 'cat_' + cat.replace(/[^a-z0-9]/gi, '_');
    html += `<div class="cat-group">
      <div class="cat-header" onclick="toggleCat('${catId}')">
        <span class="cat-chevron${fl ? ' open' : ''}" id="chev_${catId}">▶</span>
        <span>${cat}</span>
        <span style="margin-left:auto;font-size:9px;color:var(--text3)">${visible.length}</span>
      </div>
      <div class="cat-items${fl ? ' open' : ''}" id="${catId}">`;
    for (const item of visible) {
      const hasIcon = traderItems && traderItems.has(item);
      const inTraderIcon = hasIcon ? '<span class="item-in-trader-icon" title="Already in this trader">✓</span>' : '';
      const dispName = itemNames[item] ? `<span class="item-disp-name">${escHtml(itemNames[item])}</span>` : '';
      html += `<div class="item-row" onclick="addItemToSelected('${item}')">
        ${inTraderIcon}
        <span>${item}</span>
        ${dispName}
        <span class="add-icon">+</span>
      </div>`;
    }
    html += `</div></div>`;
  }

  if (!html) html = `<div class="empty">No items match "${filter}"</div>`;
  el.innerHTML = html;
}

  const chev = document.getElementById('chev_' + id);

// ── XML NAME FILES ──
function parseItemNamesXml(text) {
  // Handles windows-1251 encoded XML (read as binary string)
  // Covers all three patterns the game uses:
  //   1. <string id="st_ITEMID_name">   → key = ITEMID
  //   2. <string id="st_ITEMID">        → key = ITEMID  (no _name suffix)
  //   3. <string id="ITEMID_name">      → key = ITEMID  (no st_ prefix, but _name suffix)
  // Skip anything that looks like a description (_descr, _desc, _description)
  const result = {};
  const stringRe = /<string\s+id="([^"]+)"[^>]*>[\s\S]*?<text>([^<]*)<\/text>/g;
  let m;
  while ((m = stringRe.exec(text)) !== null) {
    const id = m[1].trim();
    const displayText = m[2].trim();
    // Skip empty or formatting-only text
    if (!displayText || displayText.startsWith('%c[') || displayText.startsWith('\\n')) continue;
    // Skip descriptions
    if (id.endsWith('_descr') || id.endsWith('_desc') || id.endsWith('_description')) continue;

    let key = null;

    if (id.startsWith('st_')) {
      // Pattern 1 & 2: strip st_ prefix, then strip optional _name suffix
      key = id.slice(3);
      if (key.endsWith('_name')) key = key.slice(0, -5);
    } else if (id.endsWith('_name')) {
      // Pattern 3: no st_ prefix but has _name suffix
      key = id.slice(0, -5);
    }
    // Anything else is not an item name entry — skip
    if (!key) continue;

    // Don't overwrite if already set (first match wins)
    if (!result[key]) result[key] = displayText;
  }
  return result;
}

// Merge new names into global map
function mergeItemNames(newNames) {
  Object.assign(itemNames, newNames);
}

document.getElementById('namesFiles').addEventListener('change', function(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  let loaded = 0;
  for (const f of files) {
    const reader = new FileReader();
    // Read as binary string to handle windows-1251 encoding
    reader.onload = ev => {
      const parsed = parseItemNamesXml(ev.target.result);
      mergeItemNames(parsed);
      loaded++;
      if (loaded === files.length) {
        saveNamesToCache(itemNames);
        renderCatList(document.getElementById('searchInput').value);
        renderTraders();
        notify(`Loaded ${files.length} name file${files.length>1?'s':''} — ${Object.keys(itemNames).length} names total (cached)`);
      }
    };
    reader.readAsBinaryString(f);
  }
  this.value = '';
});

// ── FILE UPLOAD (categories) ──
document.getElementById('catFile').addEventListener('change', function(e) {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    categories = parseLtx(ev.target.result);
    saveCategoriesToCache(ev.target.result);
    renderCatList(document.getElementById('searchInput').value);
    updateCatCount();
    notify('Categories loaded: ' + Object.keys(categories).length + ' sections (cached)');
  };
  reader.readAsText(f);
  this.value = '';
});

// ── TRADER MANAGEMENT ──
function addTrader() {
  const nameEl = document.getElementById('newTraderName');
  const name = nameEl.value.trim();
  if (!name) { notify('Enter a trader name'); return; }
  const trader = { id: genId(), name, tiers: [] };
  traders.push(trader);
  nameEl.value = '';
  renderTraders();
  renderExportSelect();
  renderExport();
}

function removeTrader(id) {
  traders = traders.filter(t => t.id !== id);
  if (selectedTier && !traders.find(t => t.id === selectedTier.traderId)) {
    selectedTier = null;
    updateSelIndicator();
  }
  renderTraders();
  renderExportSelect();
  renderExport();
  renderCatList(document.getElementById('searchInput').value);
}

function addTier(traderId) {
  const nameEl = document.getElementById('tierName_' + traderId);
  const parentEl = document.getElementById('tierParent_' + traderId);
  const name = nameEl.value.trim();
  if (!name) { notify('Enter a tier name'); return; }
  const trader = traders.find(t => t.id === traderId);
  if (!trader) return;
  trader.tiers.push({ id: genId(), name, parent: parentEl.value.trim(), items: [] });
  nameEl.value = '';
  parentEl.value = '';
  renderTraders();
  renderExport();
}

function removeTier(traderId, tierId) {
  const trader = traders.find(t => t.id === traderId);
  if (!trader) return;
  trader.tiers = trader.tiers.filter(t => t.id !== tierId);
  if (selectedTier && selectedTier.tierId === tierId) {
    selectedTier = null;
    updateSelIndicator();
  }
  renderTraders();
  renderExport();
  renderCatList(document.getElementById('searchInput').value);
}

function selectTier(traderId, tierId) {
  if (selectedTier && selectedTier.traderId === traderId && selectedTier.tierId === tierId) {
    selectedTier = null;
  } else {
    selectedTier = { traderId, tierId };
  }
  updateSelIndicator();
  renderTraders();
  renderCatList(document.getElementById('searchInput').value);
}

function updateSelIndicator() {
  const el = document.getElementById('selIndicator');
  if (selectedTier) {
    const trader = traders.find(t => t.id === selectedTier.traderId);
    const tier = trader?.tiers.find(t => t.id === selectedTier.tierId);
    if (tier) {
      el.textContent = '→ Adding to: [' + tier.name + ']';
      el.classList.add('show');
    }
  } else {
    el.classList.remove('show');
  }
}

function addItemToSelected(itemName) {
  if (!selectedTier) { notify('Select a tier first (click on a tier name)'); return; }
  const trader = traders.find(t => t.id === selectedTier.traderId);
  if (!trader) return;
  const tier = trader.tiers.find(t => t.id === selectedTier.tierId);
  if (!tier) return;
  if (tier.items.find(i => i.type === 'item' && i.name === itemName)) { notify('Item already in tier'); return; }
  tier.items.push({ type: 'item', name: itemName, amt: 1, chance: 0.75 });
  renderTraders();
  renderExport();
  renderCatList(document.getElementById('searchInput').value);
  notify('+ ' + itemName);
}

function removeItem(traderId, tierId, itemName) {
  const trader = traders.find(t => t.id === traderId);
  if (!trader) return;
  const tier = trader.tiers.find(t => t.id === tierId);
  if (!tier) return;
  tier.items = tier.items.filter(i => !(i.type === 'item' && i.name === itemName));
  renderTraders();
  renderExport();
  renderCatList(document.getElementById('searchInput').value);
}

function removeEntry(traderId, tierId, idx) {
  const trader = traders.find(t => t.id === traderId);
  if (!trader) return;
  const tier = trader.tiers.find(t => t.id === tierId);
  if (!tier) return;
  tier.items.splice(idx, 1);
  renderTraders();
  renderExport();
  renderCatList(document.getElementById('searchInput').value);
}

function moveEntry(traderId, tierId, idx, dir) {
  const trader = traders.find(t => t.id === traderId);
  if (!trader) return;
  const tier = trader.tiers.find(t => t.id === tierId);
  if (!tier) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= tier.items.length) return;
  const tmp = tier.items[idx];
  tier.items[idx] = tier.items[newIdx];
  tier.items[newIdx] = tmp;
  renderTraders();
  renderExport();
}

function syncTierOrder(traderId, tierId) {
  const trader = traders.find(t => t.id === traderId);
  if (!trader) return;
  const tier = trader.tiers.find(t => t.id === tierId);
  if (!tier) return;
  const newOrder = [];
  document.querySelectorAll(`.tier-items-list[data-tier-id="${tierId}"] > *`).forEach(el => {
    const idx = parseInt(el.dataset.idx);
    if (!isNaN(idx)) newOrder.push(tier.items[idx]);
  });
  tier.items = newOrder;
  renderTraders();
  renderExport();
}

function initDragAndDrop() {
  document.querySelectorAll('.tier-items-list').forEach(container => {
    if (container._sortable) return;
    container._sortable = new Sortable(container, {
      animation: 150,
      handle: '.drag-handle',
      ghostClass: 'sortable-ghost',
      onEnd: function(evt) {
        const tierId = parseInt(evt.to.dataset.tierId);
        const traderId = parseInt(evt.to.dataset.traderId);
        syncTierOrder(traderId, tierId);
      }
    });
  });
}

function addComment(traderId, tierId) {
  const trader = traders.find(t => t.id === traderId);
  if (!trader) return;
  const tier = trader.tiers.find(t => t.id === tierId);
  if (!tier) return;
  tier.items.push({ type: 'comment', text: '' });

function updateComment(traderId, tierId, idx, value) {
  const trader = traders.find(t => t.id === traderId);
  if (!trader) return;
  const tier = trader.tiers.find(t => t.id === tierId);
  if (!tier) return;
  if (tier.items[idx] && tier.items[idx].type === 'comment') {
    tier.items[idx].text = value;

function updateItemField(traderId, tierId, itemName, field, value) {
  const trader = traders.find(t => t.id === traderId);
  if (!trader) return;
  const tier = trader.tiers.find(t => t.id === tierId);
  if (!tier) return;
  const item = tier.items.find(i => i.type === 'item' && i.name === itemName);
  if (!item) return;
  item[field] = field === 'amt' ? Math.max(1, parseInt(value)||1) : Math.min(1, Math.max(0, parseFloat(value)||0));
  renderExport();
}

// ── OVERWRITE DETECTION ──
// For a given trader, build a map: itemName -> [tierName, ...] (all tiers containing it, in order)
function buildOverwriteMap(trader) {
  const map = {}; // itemName -> [{tierId, tierName}]
  for (const tier of trader.tiers) {
    for (const entry of tier.items) {
      if (entry.type === 'comment') continue;
      if (!map[entry.name]) map[entry.name] = [];
      map[entry.name].push({ tierId: tier.id, tierName: tier.name });
    }
  }
  return map;
}

// Returns overwrite info for a specific item in a specific tier:
// { isOverwritten: bool, overwrittenBy: tierName }   — this tier's entry is shadowed by a later tier
// { isOverwriting: bool, overwrites: tierName }       — this tier shadows an earlier tier
// A "later" tier (higher index) overrides an earlier one because the game resolves parent chains bottom-up.
function getOverwriteStatus(trader, tierId, itemName) {
  const overwriteMap = buildOverwriteMap(trader);
  const entries = overwriteMap[itemName];
  if (!entries || entries.length < 2) return null;

  const myIdx = entries.findIndex(e => e.tierId === tierId);
  if (myIdx === -1) return null;

  // Higher index = higher-numbered tier = overrides lower ones (since supplies_2 inherits supplies_1,
  // a direct entry in supplies_2 overrides the inherited one from supplies_1)
  const result = {};
  if (myIdx < entries.length - 1) {
    result.isOverwritten = true;
    result.overwrittenBy = entries[entries.length - 1].tierName;
  }
  if (myIdx > 0) {
    result.isOverwriting = true;
    result.overwrites = entries[0].tierName;
  }
  return result;
}

// ── IMPORT TRADER LTX ──
function parseTraderLtx(text, traderName) {
  const tiers = [];
  let currentTier = null;
  const lines = text.split(/\r?\n/);

  for (let line of lines) {
    const raw = line;
    line = line.trim();
    if (!line) continue;

    // Comment line
    if (line.startsWith(';')) {
      if (currentTier) {
        const commentText = line.slice(1).trim();
        currentTier.items.push({ type: 'comment', text: commentText });
      }
      continue;
    }

    // Match [section_name] or [section_name]:parent1,parent2
    const headerMatch = line.match(/^\[([^\]]+)\](?::(.+))?/);
    if (headerMatch) {
      const sectionName = headerMatch[1].trim();
      // Only import sections with "supplies" in name
      if (!sectionName.toLowerCase().includes('supplies')) { currentTier = null; continue; }

      // Parent is everything after the colon outside the brackets
      const parent = headerMatch[2] ? headerMatch[2].trim() : '';
      currentTier = { id: genId(), name: sectionName, parent, items: [] };
      tiers.push(currentTier);
    } else if (currentTier) {
      // item = amt, chance
      const m = line.match(/^([a-zA-Z0-9_.\-]+)\s*=\s*([0-9]+)\s*,\s*([0-9.]+)/);
      if (m) {
        currentTier.items.push({
          type: 'item',
          name: m[1].trim(),
          amt: parseInt(m[2]) || 1,
          chance: parseFloat(m[3]) || 0.5
        });
      }
    }
  }
  return { id: genId(), name: traderName, tiers };
}

function triggerImportDialog() {
  const name = document.getElementById('newTraderName').value.trim();
  if (!name) { notify('Enter trader name before importing'); document.getElementById('newTraderName').focus(); return; }
  document.getElementById('importFile').click();
}

document.getElementById('importFile').addEventListener('change', function(e) {
  const f = e.target.files[0];
  if (!f) return;
  const name = document.getElementById('newTraderName').value.trim() || f.name.replace(/\.ltx$/i,'').replace(/^trade_/,'');
  const reader = new FileReader();
  reader.onload = ev => {
    const trader = parseTraderLtx(ev.target.result, name);
    if (trader.tiers.length === 0) {
      notify('No supplies sections found in file');
      return;
    }
    traders.push(trader);
    document.getElementById('newTraderName').value = '';
    renderTraders();
    renderExportSelect();
    renderExport();
    notify(`Imported "${name}": ${trader.tiers.length} tiers, ${trader.tiers.reduce((s,t)=>s+t.items.length,0)} items`);
  };
  reader.readAsText(f);
  this.value = '';
});

// ── RENDER TRADERS ──
function renderTraders() {
  const el = document.getElementById('traderList');
  if (traders.length === 0) {
    el.innerHTML = '<div class="empty">No traders yet.<br>Enter a name and click Add.</div>';
    return;
  }

  let html = '';
  for (const trader of traders) {
    html += `<div class="trader-card${selectedTier?.traderId === trader.id ? ' active' : ''}">
      <div class="trader-card-header">
        <div class="trader-name">${escHtml(trader.name)}</div>
        <div class="trader-meta">${trader.tiers.length} tier${trader.tiers.length!==1?'s':''}</div>
        <button class="btn small danger" onclick="removeTrader(${trader.id})">✕</button>
      </div>
      <div class="tier-list">`;

    if (trader.tiers.length === 0) {
      html += '<div class="empty" style="padding:10px">No tiers yet</div>';
    }
    for (const tier of trader.tiers) {
      const isSel = selectedTier?.traderId === trader.id && selectedTier?.tierId === tier.id;
      html += `<div class="tier-card${isSel ? ' selected' : ''}">
        <div class="tier-header" onclick="selectTier(${trader.id}, ${tier.id})">
          <div class="tier-label">[${escHtml(tier.name)}]</div>
          ${tier.parent ? `<div class="tier-parent">:${escHtml(tier.parent)}</div>` : ''}
          <div class="tier-count">${tier.items.filter(e => e.type === 'item').length}</div>
          <button class="btn small danger" style="margin-left:4px" onclick="event.stopPropagation();removeTier(${trader.id},${tier.id})">✕</button>
        </div>`;

      if (tier.items.length > 0) {
        html += `<div class="tier-items-list" data-trader-id="${trader.id}" data-tier-id="${tier.id}">`;
        for (let idx = 0; idx < tier.items.length; idx++) {
          const entry = tier.items[idx];

          if (entry.type === 'comment') {
            html += `<div class="tier-comment" data-idx="${idx}">
              <span class="drag-handle">⋮⋮</span>
              <span class="comment-prefix">;</span>
              <input type="text" class="comment-input" value="${escHtml(entry.text)}"
                placeholder="comment text..."
                onchange="updateComment(${trader.id},${tier.id},${idx},this.value)"
                oninput="updateComment(${trader.id},${tier.id},${idx},this.value)">
              <span class="tier-comment-spacer"></span>
              <span class="rm" onclick="removeEntry(${trader.id},${tier.id},${idx})">✕</span>
            </div>`;
          } else {
            const ow = getOverwriteStatus(trader, tier.id, entry.name);
            let owBadge = '';
            let rowClass = 'tier-item';
            if (ow) {
              if (ow.isOverwritten && ow.isOverwriting) {
                rowClass += ' ow-both';
                owBadge = `<span class="ow-badge ow-badge-both" title="Overwritten by [${escHtml(ow.overwrittenBy)}] and overwrites [${escHtml(ow.overwrites)}]">⚠ mid</span>`;
              } else if (ow.isOverwritten) {
                rowClass += ' ow-dead';
                owBadge = `<span class="ow-badge ow-badge-dead" title="Overwritten by [${escHtml(ow.overwrittenBy)}] — this entry has no effect">✕ overwritten by [${escHtml(ow.overwrittenBy)}]</span>`;
              } else if (ow.isOverwriting) {
                rowClass += ' ow-active';
                owBadge = `<span class="ow-badge ow-badge-active" title="Overrides entry in [${escHtml(ow.overwrites)}]">↑ overrides [${escHtml(ow.overwrites)}]</span>`;
              }
            }
            const dispName = itemNames[entry.name]
              ? `<span class="tier-item-disp-name" title="${escHtml(itemNames[entry.name])}">${escHtml(itemNames[entry.name])}</span>`
              : `<span class="tier-item-spacer"></span>`;
            html += `<div class="${rowClass}" data-idx="${idx}">
              <span class="drag-handle">⋮⋮</span>
              <span class="tier-item-name" title="${escHtml(entry.name)}">${escHtml(entry.name)}</span>
              ${dispName}
              ${owBadge}
              <input type="number" min="1" max="99" value="${entry.amt}"
                onchange="updateItemField(${trader.id},${tier.id},'${entry.name}','amt',this.value)"
                title="Amount" style="width:54px">
              <span class="tier-item-sep">,</span>
              <input type="number" min="0" max="1" step="0.01" value="${entry.chance}"
                onchange="updateItemField(${trader.id},${tier.id},'${entry.name}','chance',this.value)"
                title="Chance (0-1)" style="width:62px">
              <span class="rm" onclick="removeItem(${trader.id},${tier.id},'${entry.name}')">✕</span>
            </div>`;
          }
        }
        html += '</div>';
      }

      html += '</div>'; // tier-card
    }

    html += `</div>
      <div class="add-tier-wrap">
        <div class="add-tier-row">
          <input type="text" id="tierName_${trader.id}" placeholder="Tier name (e.g. supplies_1)">
          <input type="text" id="tierParent_${trader.id}" placeholder="Parent (optional)" style="width:130px">
          <button class="btn primary small" onclick="addTier(${trader.id})">+ Tier</button>
        </div>
        ${selectedTier?.traderId === trader.id ? `<div class="add-comment-row">
          <button class="btn small" style="width:100%;margin-top:4px;color:var(--text3);border-style:dashed" onclick="addComment(${trader.id},${selectedTier.tierId})">+ Comment in selected tier</button>
        </div>` : ''}
      </div>
    </div>`; // trader-card
  }
  el.innerHTML = html;
  initDragAndDrop();
}

// ── EXPORT ──
function renderExportSelect() {
  const sel = document.getElementById('exportTraderSel');
  const cur = sel.value;
  let html = '<option value="__all__">All traders</option>';
  for (const t of traders) {
    html += `<option value="${t.id}">${escHtml(t.name)}</option>`;
  }
  sel.innerHTML = html;
  if (traders.find(t => String(t.id) === cur)) sel.value = cur;
}

function renderExport() {
  const sel = document.getElementById('exportTraderSel');
  const filter = sel.value;
  const toExport = filter === '__all__' ? traders : traders.filter(t => String(t.id) === filter);

  let out = '';
  for (const trader of toExport) {
    if (toExport.length > 1) out += `; ============================================================\n`;
    out += `; Trader: ${trader.name}\n`;
    if (toExport.length > 1) out += `; ============================================================\n`;
    out += '\n';

    // buy_supplies line
    if (trader.tiers.length > 0) {
      out += '; buy_supplies = ';
      const tierRefs = trader.tiers.map(t => t.name).reverse();
      out += tierRefs.join(', ');
      out += '\n\n';
    }

    for (const tier of trader.tiers) {
      const header = tier.parent ? `[${tier.name}]:${tier.parent}` : `[${tier.name}]`;
      out += header + '\n';
      if (tier.items.length === 0) {
        out += '; (empty)\n';
      } else {
        const itemEntries = tier.items.filter(e => e.type === 'item');
        const maxLen = itemEntries.length > 0 ? Math.max(...itemEntries.map(i => i.name.length)) : 0;
        for (const entry of tier.items) {
          if (entry.type === 'comment') {
            out += entry.text ? `; ${entry.text}\n` : ';\n';
          } else {
            const pad = ' '.repeat(Math.max(1, maxLen - entry.name.length + 4));
            const chance = entry.chance % 1 === 0 ? entry.chance.toFixed(0) : entry.chance;
            out += `${entry.name}${pad}= ${entry.amt}, ${chance}\n`;
          }
        }
      }
      out += '\n';
    }
  }

  if (!out) out = '; No traders defined yet.\n; Create a trader and add tiers to generate output.';
  document.getElementById('exportArea').value = out;
}

function copyExport() {
  const text = document.getElementById('exportArea').value;
  navigator.clipboard.writeText(text).then(() => notify('Copied to clipboard!'));
}

function downloadExport() {
  const text = document.getElementById('exportArea').value;
  const sel = document.getElementById('exportTraderSel');
  const traderName = sel.value === '__all__' ? 'traders' : (traders.find(t => String(t.id) === sel.value)?.name || 'export');
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `trade_${traderName}.ltx`;
  a.click();
  notify('Downloaded!');
}

function exportAll() {
  document.getElementById('exportTraderSel').value = '__all__';
  renderExport();
  downloadExport();
}

// ── UTILS ──
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let notifTimer;
function notify(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ── KEYBOARD: ENTER TO ADD TRADER ──
document.getElementById('newTraderName').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTrader();
});

// ── LEFT PANEL RESIZE ──
(function() {
  const handle = document.getElementById('leftResizeHandle');
  const grid   = document.getElementById('appGrid');
  const MIN_W  = 160;
  const MAX_W  = 600;
  let dragging = false, startX = 0, startW = 0;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = parseInt(getComputedStyle(grid).gridTemplateColumns.split(' ')[0]) || 300;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const newW = Math.min(MAX_W, Math.max(MIN_W, startW + (e.clientX - startX)));
    grid.style.setProperty('--left-w', newW + 'px');
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

initDefault();
renderTraders();
renderExport();
</script>
